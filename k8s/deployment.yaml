apiVersion: apps/v1
kind: Deployment
metadata:
  name: flame-web
  namespace: flame-dating
  labels:
    app: flame
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flame
      component: web
  template:
    metadata:
      labels:
        app: flame
        component: web
    spec:
      containers:
        - name: flame-web
          # Replace with your actual container registry image
          image: ghcr.io/mast898/tinder:v5
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: flame-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      restartPolicy: Always
