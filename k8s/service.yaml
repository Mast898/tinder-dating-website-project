apiVersion: v1
kind: Service
metadata:
  name: flame-web-service
  namespace: flame-dating
  labels:
    app: flame
    component: web
spec:
  type: NodePort
  selector:
    app: flame
    component: web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
      nodePort: 30080
