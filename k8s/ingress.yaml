apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flame-ingress
  namespace: flame-dating
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Uncomment below if you have cert-manager installed for auto TLS:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  # Uncomment the tls block after setting up cert-manager + your domain:
  # tls:
  #   - hosts:
  #       - flame.yourdomain.com
  #     secretName: flame-tls
  rules:
    # Replace with your actual domain, or remove "host" to accept all traffic
    - host: flame.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flame-web-service
                port:
                  number: 80
